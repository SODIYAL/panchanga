# Dependabot version updates.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # npm dependencies (package.json / package-lock.json live at the repo root).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # One grouped PR for routine minor/patch bumps; majors stay separate so
    # breaking changes get their own review.
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the CI workflow (.github/workflows/*.yml).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
