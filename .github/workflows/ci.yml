name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Vitest 4 requires Node ^22.12 || ^24 || >=26; 22.x resolves to a
          # compatible release.
          node-version: "22"
          cache: npm

      # Reproducible, integrity-checked install from the committed lockfile.
      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Test
        run: npm test

      - name: Audit (fail on high or critical)
        run: npm audit --audit-level=high
